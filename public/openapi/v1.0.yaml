---
openapi: 3.0.3
info:
  title: Register API
  version: v1.0
paths:
  "/api/{api_version}/info":
    get:
      summary: show
      tags:
      - Api::Info
      parameters:
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v1.0
      responses:
        '200':
          description: shows the requested version
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: object
                    properties:
                      requested:
                        type: string
                      latest:
                        type: string
                    required:
                    - requested
                    - latest
                required:
                - status
                - version
              example:
                status: ok
                version:
                  requested: v1.0
                  latest: v1.0
  "/api/{api_version}/trainees":
    get:
      summary: index
      tags:
      - Api::Trainee
      parameters:
      - name: academic_cycle
        in: query
        required: false
        schema:
          type: string
        example: not-a-number
      - name: api_version
        in: path
        required: true
        schema:
          type: string
        example: v1.0
      - name: has_trn
        in: query
        required: false
        schema:
          nullable: true
        example: ''
      - name: page
        in: query
        required: false
        schema:
          type: integer
        example: 1
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
        example: 5
      - name: since
        in: query
        required: false
        schema:
          type: string
        example: 2023-13-01
      - name: sort_order
        in: query
        required: false
        schema:
          type: string
        example: asc
      - name: status
        in: query
        required: false
        schema:
          type: string
        example: invalid_state
      responses:
        '200':
          description: sorts the results in ascending order when specified
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
