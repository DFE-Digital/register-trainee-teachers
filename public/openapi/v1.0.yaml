        '401':
          description: did not change the trainee
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
        '404':
          description: returns status 404 with a valid JSON response
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        error:
                          type: string
                        message:
                          type: string
                      required:
                      - error
                      - message
                required:
                - errors
              example:
                errors:
                - error: NotFound
                  message: Trainee(s) not found
        '422':
          description: returns status 422 with a valid JSON response
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        error:
                          type: string
                        message:
                          type: string
                      required:
                      - error
                      - message
                required:
                - errors
              example:
                errors:
                - error: UnprocessableEntity
                  message: Withdraw date Choose a withdrawal date
                - error: UnprocessableEntity
                  message: Reasons Choose one or more reasons why the trainee withdrew
                    from the course, or select "Unknown"
  "/healthcheck":
    get:
      summary: healthcheck
      tags:
      - Heartbeat
      responses:
        '200':
          description: returns JSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  checks:
                    type: object
                    properties:
                      database:
                        type: boolean
                      redis:
                        type: boolean
                      sidekiq_processes:
                        type: boolean
                    required:
                    - database
                    - redis
                    - sidekiq_processes
                required:
                - checks
              example:
                checks:
                  database: true
                  redis: true
                  sidekiq_processes: true
        '503':
          description: sets the sidekiq queue to false
          content:
            application/json:
              schema:
                type: object
                properties:
                  checks:
                    type: object
                    properties:
                      database:
                        type: boolean
                      redis:
                        type: boolean
                      sidekiq_processes:
                        type: boolean
                    required:
                    - database
                    - redis
                    - sidekiq_processes
                required:
                - checks
              example:
                checks:
                  database: false
                  redis: true
                  sidekiq_processes: true
  "/ping":
    get:
      summary: ping
      tags:
      - Heartbeat
      responses:
        '200':
          description: returns PONG
          content:
            text/plain:
              schema:
                type: string
              example: PONG
  "/sha":
    get:
      summary: sha
      tags:
      - Heartbeat
      responses:
        '200':
          description: returns the sha from the env var COMMIT_SHA
          content:
            application/json:
              schema:
                type: object
                properties:
                  sha:
                    type: string
                required:
                - sha
              example:
                sha: deadbeef
  "/{path}":
    get:
      summary: GET /:path
      tags: []
      parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
        example: accessibility
      responses:
        '301':
          description: redirects paths to register-trainee-teachers.service.gov.uk
          content:
            text/html:
              schema:
                type: string
              example: ''
