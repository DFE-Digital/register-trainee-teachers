          description: returns 422 if academic cycle filter is invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: object
                    properties:
                      academic_cycle:
                        type: array
                        items:
                          type: string
                      since:
                        type: array
                        items:
                          type: string
                      status:
                        type: array
                        items:
                          type: string
                required:
                - message
                - errors
              example:
                message: 'Validation failed: 1 error prohibited this request being
                  run'
                errors:
                  academic_cycle:
                  - not-a-number is not a valid academic cycle year
                  since:
                  - 2023-13-01 is not a valid date
                  status:
                  - invalid_state is not a valid status
