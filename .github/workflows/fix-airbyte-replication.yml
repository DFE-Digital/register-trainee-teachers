name: Fix Airbyte Replication

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to fix
        required: true
        default: production
        type: choice
        options:
          - qa
          - staging
          - production
      action:
        description: |
          recreate-slot: Recreates the replication slot if it does not exist.
          fix-lsn-error: Drops and recreates the replication slot to fix LSN mismatch errors.
        required: true
        default: recreate-slot
        type: choice
        options:
          - recreate-slot
          - fix-lsn-error

permissions:
  id-token: write

env:
  SERVICE_NAME: register
  SERVICE_SHORT: rtt
  TF_VARS_PATH: terraform/aks/workspace-variables

jobs:
  fix-replication:
    name: Fix Airbyte replication (${{ inputs.action }}) on ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    env:
      DEPLOY_ENV: ${{ inputs.environment }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set environment variables
      run: |
        source global_config/${DEPLOY_ENV}.sh
        tf_vars_file=${TF_VARS_PATH}/${DEPLOY_ENV}.tfvars.json
        echo "CLUSTER=$(jq -r '.cluster' ${tf_vars_file})" >> $GITHUB_ENV
        echo "NAMESPACE=$(jq -r '.namespace' ${tf_vars_file})" >> $GITHUB_ENV

    - name: Install kubectl
      uses: DFE-Digital/github-actions/set-kubectl@master

    - uses: DFE-Digital/github-actions/set-kubelogin-environment@master
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}

    - name: Get cluster credentials
      run: make ci ${{ inputs.environment }} get-cluster-credentials

    - name: Install konduit
      run: make install-konduit

    - name: Install postgres client
      uses: DFE-Digital/github-actions/install-postgres-client@master

    - name: Check replication slot status
      run: |
        bin/konduit.sh -n ${{ env.NAMESPACE }} -t 60 \
          ${{ env.SERVICE_NAME }}-${{ env.DEPLOY_ENV }} -- \
          psql -c "SELECT slot_name, active, confirmed_flush_lsn, \
                   pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), restart_lsn)) AS retained_wal \
                   FROM pg_replication_slots WHERE slot_name = 'airbyte_slot';"

    - name: Drop replication slot (fix-lsn-error)
      if: ${{ inputs.action == 'fix-lsn-error' }}
      run: |
        bin/konduit.sh -n ${{ env.NAMESPACE }} -i bin/stop-replication.psql -t 120 \
          ${{ env.SERVICE_NAME }}-${{ env.DEPLOY_ENV }} -- psql

    - name: Recreate replication slot if it does not exist (recreate-slot)
      if: ${{ inputs.action == 'recreate-slot' }}
      run: |
        bin/konduit.sh -n ${{ env.NAMESPACE }} -t 60 \
          ${{ env.SERVICE_NAME }}-${{ env.DEPLOY_ENV }} -- \
          psql -c "SELECT CASE
                     WHEN NOT EXISTS (
                       SELECT 1 FROM pg_replication_slots WHERE slot_name = 'airbyte_slot'
                     )
                     THEN pg_create_logical_replication_slot('airbyte_slot', 'pgoutput')::text
                     ELSE 'Slot already exists, no action taken'
                   END AS result;"

    - name: Verify replication slot after fix
      run: |
        bin/konduit.sh -n ${{ env.NAMESPACE }} -t 60 \
          ${{ env.SERVICE_NAME }}-${{ env.DEPLOY_ENV }} -- \
          psql -c "SELECT slot_name, active, confirmed_flush_lsn \
                   FROM pg_replication_slots WHERE slot_name = 'airbyte_slot';"