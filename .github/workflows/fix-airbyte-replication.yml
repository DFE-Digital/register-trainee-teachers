name: Fix Airbyte Replication

on:
  push:
    branches:
      - airbyte-replication-fix-workflows
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to fix
        required: true
        default: qa
        type: choice
        options:
          - qa
          - staging
          - production
      dry-run:
        description: Dry run check slot status only do not create slot
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  id-token: write

env:
  SERVICE_NAME: register
  SERVICE_SHORT: rtt
  TF_VARS_PATH: terraform/aks/workspace-variables

jobs:
  fix-replication:
    name: Fix Airbyte replication
    runs-on: ubuntu-latest
    environment:
      name: qa
    env:
      DEPLOY_ENV: ${{ github.event_name == 'push' && 'qa' || inputs.environment }}
      DRY_RUN: ${{ github.event_name == 'push' && 'true' || inputs.dry-run }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set environment variables
      run: |
        source global_config/${DEPLOY_ENV}.sh
        tf_vars_file=${TF_VARS_PATH}/${DEPLOY_ENV}.tfvars.json
        echo "CLUSTER=$(jq -r '.cluster' ${tf_vars_file})" >> $GITHUB_ENV
        echo "NAMESPACE=$(jq -r '.namespace' ${tf_vars_file})" >> $GITHUB_ENV

    - name: Get cluster credentials
      run: make ci ${{ env.DEPLOY_ENV }} get-cluster-credentials

    - name: Fix Airbyte replication slot
      uses: DFE-Digital/github-actions/fix-airbyte-replication@feature/airbyte-replication
      with:
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        app-name: ${{ env.SERVICE_NAME }}-${{ env.DEPLOY_ENV }}
        namespace: ${{ env.NAMESPACE }}
        cluster: ${{ env.CLUSTER }}
        dry-run: ${{ env.DRY_RUN }}