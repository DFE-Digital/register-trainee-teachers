name: Dependabot Tracking (Never Runs)

# This workflow exists solely to enable Dependabot tracking for third-party actions
# that are SHA-pinned in our actual workflows for security purposes.
#
# Dependabot does NOT track version updates for SHA-pinned actions. By maintaining
# semantic version references here, Dependabot can alert us to new releases.
#
# This workflow NEVER runs - it is for tracking purposes only.

on:
  workflow_dispatch:

jobs:
  tracking-only:
    if: false
    runs-on: ubuntu-latest
    steps:
      # rtCamp/action-slack-notify v4.6.0
      # SHA: b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
      - uses: codecov/codecov-action@v6.0.0

      # marocchino/sticky-pull-request-comment@ v2.9.4
      # SHA: 773744901bac0e8cbb5a0dc842800d45e9b2b405
      - uses: marocchino/sticky-pull-request-comment@2.9.4

      # fastify/github-action-merge-dependabot v3.11.2
      # SHA: 1b2ed42db8f9d81a46bac83adedfc03eb5149dff
      - uses: fastify/github-action-merge-dependabot@v3.11.2

      # rtCamp/action-slack-notify v3.8.0
      # SHA: e68c23e6309f2871ca8ae4763e7629b9c258e1ea
      - uses: Wandalen/wretry.action@v3.8.0
