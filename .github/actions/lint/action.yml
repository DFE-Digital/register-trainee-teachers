name: Lint

description: Run various linters on the codebase

inputs:
  linter-type:
    description: Type of linter to run
    required: true
  command:
    description: Command to run for the linter
    required: true
  docker-image:
    description: Docker image to use
    required: true
  image-tag:
    description: Image tag to use
    required: true
  teams-webhook:
    description: Teams webhook to use
    required: true

runs:
  using: 'composite'
  steps:
    - name: Bring docker image up
      uses: ./.github/actions/bring-docker-image-up/
      with:
        docker-image: ${{ inputs.docker-image }}
        image-tag: ${{ inputs.image-tag }}

    - name: Run linter
      shell: bash
      run: ${{ inputs.command }}
      env:
        COMMAND: ${{ inputs.command }}

    - name: Check for Failure
      uses: ./.github/actions/send-teams-notification/
      if: ${{ failure() && github.ref == 'refs/heads/main' }}
      with:
        teams-title: 'Lint failure'
        teams-message: 'Lint failure for ${{ inputs.linter-type }} on commit ${{inputs.image-tag}}'
        teams-webhook: ${{ inputs.teams-webhook }}
